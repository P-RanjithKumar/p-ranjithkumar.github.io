<!DOCTYPE html>
<html lang="hi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#07060b">
    <title>All The Best ✨</title>
    <meta name="description" content="A special message just for you.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Tiro+Devanagari+Hindi:ital@0;1&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Three.js for real 3D heart (r128 UMD — works from file://) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>

<body>

    <!-- ======= START OVERLAY ======= -->
    <div id="start-overlay">
        <div class="start-content">
            <div class="start-heart-icon">💛</div>
            <h1 class="start-title">A Message For You</h1>
            <p class="start-subtitle">🎧 Put on your headphones</p>
            <button id="start-btn">
                <span>Begin the Journey</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="5 3 19 12 5 21 5 3" />
                </svg>
            </button>
        </div>
    </div>

    <!-- ======= PARTICLE CANVAS ======= -->
    <canvas id="particle-canvas"></canvas>

    <!-- ======= MAIN SCENE ======= -->
    <div id="scene">

        <!-- Real 3D Heart (WebGL) -->
        <canvas id="heart-canvas"></canvas>

        <!-- Dialog Text Display -->
        <div id="dialog-container">
            <p id="dialog-text"></p>
        </div>

        <!-- Progress Bar -->
        <div id="progress-bar-container">
            <div id="progress-bar"></div>
        </div>
    </div>

    <!-- ======= FINALE OVERLAY ======= -->
    <div id="finale-overlay">
        <div class="finale-content">
            <div class="finale-heart">💛</div>
            <h1 class="finale-title">ALL THE BEST!</h1>
            <p class="finale-subtitle">You've got this. I believe in you. ✨</p>
        </div>
    </div>

    <!-- ======= AUDIO ======= -->
    <audio id="audio" preload="auto">
        <source src="videoplayback.m4a" type="audio/mp4">
    </audio>

    <script src="script.js"></script>
</body>

</html>
